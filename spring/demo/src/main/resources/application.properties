spring.application.name=demo
server.port=8080
spring.web.resources.cache.period=0

spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.cachecontrol.max-age=0


gemini.apiKey=${GEMINI_API_KEY:AIzaSyDIDQ16D8s59FdcFCQTkPlRISsBgbhrIzM}
gemini.model=${GEMINI_MODEL:gemini-3-flash-preview}
gemini.baseUrl=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

# Python sidecar (FastAPI)
sidecar.baseUrl=${SIDECAR_BASE_URL:http://localhost:8000}

# File upload limits (NIfTI MRI volumes can be 50-200 MB)
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
server.tomcat.max-http-form-post-size=512MB
server.tomcat.max-swallow-size=-1
